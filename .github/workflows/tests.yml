name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install your project + dev dependencies (pytest lives here)
      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      # Sanity check (helps debug future CI issues)
      - name: Verify environment
        run: |
          python -c "import sidewinder; print('sidewinder import OK')"
          python -m pip show pytest

      - name: Run tests
        run: python -m pytest -q